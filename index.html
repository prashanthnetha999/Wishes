<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book — Page Turn</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pw: 440px;
            --ph: 600px;
            --paper: #fdf6e3;
            --ink: #2c1810;
            --ink-light: #5a3e2b;
            --accent: #8b2500;
            --cover: #1a0a00;
            --gold: #c9a84c;
            --gold-light: #f0d080;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 55% 40%, #2a1a0a 0%, #0d0600 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'EB Garamond', Georgia, serif;
            overflow: hidden;
            user-select: none;
        }

        .dust {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

            .dust span {
                position: absolute;
                border-radius: 50%;
                background: rgba(201,168,76,.3);
                animation: fdust linear infinite;
            }

        @keyframes fdust {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }

            8% {
                opacity: 1;
            }

            92% {
                opacity: .3;
            }

            100% {
                transform: translateY(-8vh) translateX(30px);
                opacity: 0;
            }
        }

        .scene {
            perspective: 2200px;
            position: relative;
            z-index: 1;
        }

        .book {
            position: relative;
            width: var(--pw);
            height: var(--ph);
            transform-style: preserve-3d;
        }

            .book::after {
                content: '';
                position: absolute;
                bottom: -18px;
                left: 8%;
                width: 84%;
                height: 20px;
                background: radial-gradient(ellipse, rgba(0,0,0,.55) 0%, transparent 70%);
                filter: blur(6px);
                z-index: -1;
            }

        /* Static page beneath the flip */
        .page-static {
            position: absolute;
            inset: 0;
            background: var(--paper);
            border-radius: 4px 6px 6px 4px;
            box-shadow: 2px 2px 12px rgba(0,0,0,.4), inset -2px 0 8px rgba(0,0,0,.06);
            overflow: hidden;
        }

        /* Flip layer */
        .flip-wrap {
            position: absolute;
            inset: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform .85s cubic-bezier(.645,.045,.355,1);
            cursor: pointer;
        }

            .flip-wrap.go {
                transform: rotateY(-180deg);
            }

        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            border-radius: 4px 6px 6px 4px;
        }

            .face.front {
                background: var(--paper);
                box-shadow: 3px 0 14px rgba(0,0,0,.25);
            }

                .face.front::after {
                    content: '';
                    position: absolute;
                    top: 0;
                    right: 0;
                    width: 22px;
                    height: 100%;
                    background: linear-gradient(to right, transparent, rgba(0,0,0,.06));
                    pointer-events: none;
                }

            .face.back {
                background: var(--paper);
                transform: rotateY(180deg);
                box-shadow: -3px 0 14px rgba(0,0,0,.25);
            }

                .face.back::before {
                    content: '';
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 28px;
                    height: 100%;
                    background: linear-gradient(to right, rgba(0,0,0,.09), transparent);
                    pointer-events: none;
                }

        /* Corner curl */
        .flip-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 0 32px 32px;
            border-color: transparent transparent rgba(0,0,0,.13) transparent;
            transition: border-width .25s ease;
            z-index: 5;
        }

        .flip-wrap:hover:not(.go)::after {
            border-width: 0 0 52px 52px;
        }

        /* ── Page content ── */
        .page-content {
            padding: 50px 44px 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: var(--ink);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(44,24,16,.15);
            padding-bottom: 9px;
            margin-bottom: 26px;
        }

            .page-header .title-sm {
                font-family: 'Playfair Display', serif;
                font-size: .68rem;
                letter-spacing: .2em;
                text-transform: uppercase;
                color: var(--ink-light);
            }

        .page-num {
            font-size: .68rem;
            color: var(--ink-light);
            font-style: italic;
        }

        .chapter-label {
            font-family: 'Playfair Display', serif;
            font-size: .62rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .chapter-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.22;
            color: var(--ink);
            margin-bottom: 20px;
        }

            .chapter-title em {
                font-style: italic;
                color: var(--accent);
            }

        .drop-cap::first-letter {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            line-height: .75;
            margin-right: 8px;
            margin-top: 5px;
            color: var(--accent);
        }

        .body-text {
            font-size: .95rem;
            line-height: 1.82;
            color: var(--ink);
            flex: 1;
            overflow: hidden;
        }

            .body-text p {
                margin-bottom: 1em;
                text-align: justify;
            }

        .ornament {
            text-align: center;
            color: var(--gold);
            font-size: 1rem;
            margin: 12px 0;
            letter-spacing: .35em;
        }

        .page-footer {
            border-top: 1px solid rgba(44,24,16,.15);
            padding-top: 9px;
            margin-top: auto;
            text-align: center;
            font-size: .63rem;
            color: var(--ink-light);
            font-style: italic;
            letter-spacing: .06em;
        }

        /* Cover */
        .cover-wrap {
            background: var(--cover);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 44px 34px;
            position: relative;
            overflow: hidden;
        }

            .cover-wrap::before {
                content: '';
                position: absolute;
                inset: 12px;
                border: 1.5px solid rgba(201,168,76,.35);
                border-radius: 2px;
                pointer-events: none;
            }

            .cover-wrap::after {
                content: '';
                position: absolute;
                inset: 17px;
                border: .5px solid rgba(201,168,76,.18);
                border-radius: 2px;
                pointer-events: none;
            }

        .cov-orn {
            color: var(--gold);
            font-size: 1.7rem;
            letter-spacing: .5em;
            margin-bottom: 20px;
        }

        .cov-sub {
            font-size: .72rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
        }

        .cov-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem;
            font-weight: 700;
            color: #f5e6c8;
            text-align: center;
            line-height: 1.2;
        }

        .cov-auth {
            font-style: italic;
            color: var(--gold-light);
            font-size: 1rem;
            margin-top: 22px;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 26px;
            z-index: 1;
            position: relative;
        }

        .btn-row {
            display: flex;
            gap: 20px;
        }

        .btn {
            background: none;
            border: 1px solid rgba(201,168,76,.45);
            color: var(--gold-light);
            font-family: 'EB Garamond', serif;
            font-size: .9rem;
            letter-spacing: .2em;
            padding: 9px 28px;
            cursor: pointer;
            border-radius: 2px;
            text-transform: uppercase;
            transition: background .2s, border-color .2s, color .2s;
        }

            .btn:hover {
                background: rgba(201,168,76,.1);
                border-color: var(--gold);
                color: var(--gold);
            }

            .btn:disabled {
                opacity: .25;
                pointer-events: none;
            }

        .dots {
            display: flex;
            gap: 7px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(201,168,76,.2);
            border: 1px solid rgba(201,168,76,.38);
            transition: background .3s;
        }

            .dot.active {
                background: var(--gold);
            }

        .pg-label {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: .78rem;
            color: rgba(201,168,76,.5);
            letter-spacing: .08em;
        }
    </style>
</head>
<body>

    <div class="dust" id="dust"></div>

    <div class="scene">
        <div class="book">
            <div class="page-static" id="staticPage"></div>
            <div class="flip-wrap" id="flipWrap">
                <div class="face front" id="frontFace"></div>
                <div class="face back" id="backFace"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-row">
            <button class="btn" id="prevBtn" onclick="prevPage()">◂ Prev</button>
            <button class="btn" id="nextBtn" onclick="nextPage()">Next ▸</button>
        </div>
        <div class="dots" id="dots"></div>
        <div class="pg-label" id="pgLabel"></div>
    </div>

    <script>
        const pages = [
            {
                html: `<div class="cover-wrap">

          <div class="cov-sub">A Novel</div>
          <div class="cov-title">The Whispering<br>Manuscript</div>
          <div class="cov-auth">— Elara Voss —</div>
        </div>`
            },
            {
                html: `<div class="page-content">
          <div class="page-header">
            <span class="title-sm">The Whispering Manuscript</span>
            <span class="page-num">1</span>
          </div>
          <div class="chapter-label">Chapter I</div>
          <div class="chapter-title">The <em>Old</em> Library</div>
          <div class="body-text">
            <p class="drop-cap">The library had stood for three centuries, its amber stone walls absorbing the whispers of every scholar who had ever passed through its iron-clad doors.</p>
            <p>Rain traced silver rivulets down the arched windows as Mira pressed her lantern closer to the shelf. Thousands of spines — oxblood, sage, coal — regarded her with the patient indifference of monuments.</p>
            <p>She had come looking for a census record. What she found instead was a gap — a deliberate, careful gap — where a single volume had been removed, leaving only a thin shadow in the dust.</p>
          </div>
      
          <div class="page-footer">The Whispering Manuscript</div>
        </div>`
            },
            {
                html: `<div class="page-content">
          <div class="page-header">
            <span class="title-sm">Chapter I — The Old Library</span>
            <span class="page-num">2</span>
          </div>
          <div class="body-text">
            <p>"Someone took it recently," she murmured. The dust displacement was too clean, the surrounding spines still gently leaning into the void as though in mourning.</p>
            <p>Behind her the reading room creaked. Mira spun, lantern raised — but the hall was empty, its long oak tables bare, candle-stands cold. The door to the restricted annex stood ajar, breathing a thread of colder air into the room.</p>
            <p>She had been given a single afternoon's access. The archivist, a wiry man with ink-stained cuffs, had made that clear in three separate languages. She crossed to the annex door anyway.</p>
            <p>Beyond it, a spiral stair descended into darkness that smelled of river water and old leather — and, faintly, of burning.</p>
          </div>
          <div class="ornament">· · ✦ · ·</div>
          <div class="page-footer">The Whispering Manuscript</div>
        </div>`
            },
            {
                html: `<div class="page-content">
          <div class="page-header">
            <span class="title-sm">The Whispering Manuscript</span>
            <span class="page-num">3</span>
          </div>
          <div class="chapter-label">Chapter II</div>
          <div class="chapter-title">The <em>Hidden</em> Annex</div>
          <div class="body-text">
            <p class="drop-cap">Sixteen steps down the stone stair, the darkness yielded to a low amber glow.</p>
            <p>Twelve lanterns — oil, not gas — hung from iron hooks above a chamber no larger than a drawing room. Every surface was shelf, and every shelf was full. But unlike the archive above, where books were catalogued, tagged and tamed, these volumes were layered in strata, as geologists find rock.</p>
            <p>The oldest, on the lowest shelves, were wrapped in cloth and sealed with wax. Something had been pressed into each seal — not a crest but a symbol she did not recognise: a circle bisected by a descending line.</p>
          </div>
          <div class="page-footer">The Whispering Manuscript</div>
        </div>`
            },
            {
                html: `<div class="page-content">
          <div class="page-header">
            <span class="title-sm">Chapter II — The Hidden Annex</span>
            <span class="page-num">4</span>
          </div>
          <div class="body-text">
            <p>Mira knelt before the lowest shelf. The cloth of the nearest volume was undisturbed — but the one beside it bore a fresh handprint in the dust, fingers pointing inward as though the reader had steadied themselves before opening it.</p>
            <p>She lifted the undisturbed volume. The wax seal cracked at a touch, releasing a breath of cedar and something sharper — vinegar, perhaps, or time itself compressed into a scent. Inside, the pages were vellum, the script a crabbed Latin she could parse only in fragments.</p>
            <p><em>…the manuscript moves of its own volition toward those who are prepared to believe what it contains…</em></p>
            <p>Somewhere above her, the archive's iron doors rang shut. Then the lights — all twelve lanterns — went out at once.</p>
          </div>
      
          <div class="page-footer">The Whispering Manuscript</div>
        </div>`
            },
            {
                html: `<div class="cover-wrap">
          <div class="cov-orn">✦</div>
          <div class="cov-sub">End of Excerpt</div>
          <div class="cov-title">To be<br>continued…</div>
          <div class="cov-auth" style="font-size:.8rem;color:rgba(201,168,76,.55);margin-top:28px;">
            The Whispering Manuscript<br>© Elara Voss
          </div>
        </div>`
            }
        ];

        let current = 0;
        let busy = false;

        const flipWrap = document.getElementById('flipWrap');
        const frontFace = document.getElementById('frontFace');
        const backFace = document.getElementById('backFace');
        const staticPg = document.getElementById('staticPage');

        function render() {
            frontFace.innerHTML = pages[current].html;
            staticPg.innerHTML = '';

            const dotsEl = document.getElementById('dots');
            dotsEl.innerHTML = '';
            pages.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = 'dot' + (i === current ? ' active' : '');
                dotsEl.appendChild(d);
            });

            document.getElementById('pgLabel').textContent =
                'Page ' + (current + 1) + ' of ' + pages.length;
            document.getElementById('prevBtn').disabled = current === 0;
            document.getElementById('nextBtn').disabled = current === pages.length - 1;
        }

        function nextPage() {
            if (busy || current >= pages.length - 1) return;
            busy = true;

            backFace.innerHTML = pages[current + 1].html;
            staticPg.innerHTML = pages[current + 1].html;

            flipWrap.classList.add('go');

            setTimeout(() => {
                current++;
                flipWrap.style.transition = 'none';
                flipWrap.classList.remove('go');
                render();
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    flipWrap.style.transition = '';
                    busy = false;
                }));
            }, 860);
        }

        function prevPage() {
            if (busy || current === 0) return;
            busy = true;

            frontFace.innerHTML = pages[current - 1].html;
            backFace.innerHTML = pages[current].html;
            staticPg.innerHTML = pages[current - 1].html;

            flipWrap.style.transition = 'none';
            flipWrap.classList.add('go');

            requestAnimationFrame(() => requestAnimationFrame(() => {
                flipWrap.style.transition = '';
                flipWrap.classList.remove('go');
                setTimeout(() => {
                    current--;
                    busy = false;
                    render();
                }, 860);
            }));
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'PageDown') nextPage();
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') prevPage();
        });

        flipWrap.addEventListener('click', nextPage);

        // Dust particles
        const dustEl = document.getElementById('dust');
        for (let i = 0; i < 24; i++) {
            const s = document.createElement('span');
            const sz = 1 + Math.random() * 2.5;
            s.style.cssText = `left:${Math.random() * 100}%;width:${sz}px;height:${sz}px;animation-duration:${9 + Math.random() * 14}s;animation-delay:${-Math.random() * 22}s;opacity:${.15 + Math.random() * .45};`;
            dustEl.appendChild(s);
        }

        render();
    </script>
</body>
</html>
